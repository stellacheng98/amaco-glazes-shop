<!DOCTYPE html>
<html lang="en" style="color-scheme: light only;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glaze Detail — Sample Glaze Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .detail-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    .detail-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--ink-light);
      text-decoration: none;
      margin-bottom: 32px;
      transition: color .15s;
    }
    .detail-back:hover { color: var(--peach); }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }
    @media (max-width: 640px) {
      .detail-grid { grid-template-columns: 1fr; gap: 32px; }
    }

    .detail-img-wrap {
      border-radius: 20px;
      overflow: hidden;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .detail-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .detail-swatch-fallback {
      width: 100%;
      height: 100%;
      border-radius: 20px;
    }

    .detail-info { display: flex; flex-direction: column; gap: 20px; }

    .detail-badges { display: flex; gap: 8px; flex-wrap: wrap; }

    .detail-series-badge {
      font-family: 'Inter', sans-serif;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--peach);
      color: #fff;
    }

    .detail-code {
      font-family: 'Inter', sans-serif;
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink-light);
    }
    .detail-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      line-height: 1.1;
      color: var(--ink);
      margin: 0;
    }
    .detail-series-name {
      font-family: 'Inter', sans-serif;
      font-size: .85rem;
      color: var(--ink-light);
    }

    .detail-price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .detail-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--ink);
    }
    .detail-price-sub {
      font-family: 'Inter', sans-serif;
      font-size: .8rem;
      color: var(--ink-light);
    }

    .detail-divider {
      height: 1px;
      background: var(--border);
    }

    .detail-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .detail-meta-item {
      background: var(--surface);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .detail-meta-label {
      font-family: 'Inter', sans-serif;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 4px;
    }
    .detail-meta-value {
      font-family: 'Inter', sans-serif;
      font-size: .9rem;
      font-weight: 500;
      color: var(--ink);
    }

    .detail-actions { display: flex; flex-direction: column; gap: 12px; }

    .detail-add-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--peach);
      color: #fff;
      border: none;
      border-radius: 40px;
      padding: 14px 28px;
      font-family: 'Inter', sans-serif;
      font-size: .85rem;
      font-weight: 600;
      letter-spacing: .04em;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .detail-add-btn:hover { background: var(--peach2); transform: translateY(-1px); }
    .detail-add-btn:disabled {
      background: var(--border);
      color: var(--ink-light);
      cursor: not-allowed;
      transform: none;
    }

    .detail-amaco-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1.5px solid var(--border);
      border-radius: 40px;
      padding: 13px 28px;
      font-family: 'Inter', sans-serif;
      font-size: .85rem;
      font-weight: 500;
      color: var(--ink);
      text-decoration: none;
      transition: border-color .15s, color .15s;
    }
    .detail-amaco-link:hover { border-color: var(--peach); color: var(--peach); }
    .detail-amaco-link svg { flex-shrink: 0; }

    .detail-note {
      font-family: 'Inter', sans-serif;
      font-size: .78rem;
      color: var(--ink-light);
      line-height: 1.5;
    }

    .detail-not-found {
      text-align: center;
      padding: 80px 24px;
    }
    .detail-not-found h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      margin-bottom: 12px;
    }
    .detail-not-found p {
      font-family: 'Inter', sans-serif;
      color: var(--ink-light);
      margin-bottom: 24px;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <div class="logo-mark">🏺</div>
        <div>
          <span class="logo-text">Sample Glaze Co.</span>
          <span class="logo-sub">AMACO Sample Shop</span>
        </div>
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Shop</a>
        <a href="about.html" class="nav-link">About</a>
        <button class="cart-btn" onclick="toggleCart()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          Cart <span class="cart-count" id="cart-count">0</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- DETAIL CONTENT -->
  <main class="detail-wrap" id="detail-main"></main>

  <!-- CART DRAWER -->
  <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
  <aside class="cart-drawer" id="cart-drawer">
    <div class="cart-header">
      <h2>Your cart</h2>
      <button class="cart-close" onclick="toggleCart()" aria-label="Close cart">✕</button>
    </div>
    <div class="cart-items" id="cart-items">
      <div class="cart-empty">
        <span class="cart-empty-icon">🏺</span>
        Your cart is empty.
      </div>
    </div>
    <div class="cart-footer" id="cart-footer" style="display:none">
      <div class="cart-total">
        <span>Total</span>
        <strong id="cart-total">$0.00</strong>
      </div>
      <button class="btn-primary full-width" onclick="checkout()">Checkout →</button>
    </div>
  </aside>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-logo-wrap">
        <div class="footer-mark">🏺</div>
        <span class="footer-logo-text">Sample Glaze Co.</span>
      </div>
      <div class="footer-links">
        <a href="index.html" class="footer-link">Shop</a>
        <a href="about.html" class="footer-link">About</a>
      </div>
      <div class="footer-divider"></div>
      <p class="footer-legal">Glazes are AMACO brand products resold as 4 oz samples. Sample Glaze Co. is not affiliated with or endorsed by AMACO / American Art Clay Co.</p>
      <p class="footer-legal" style="opacity:.5">© 2026 Sample Glaze Co.</p>
    </div>
  </footer>

  <script src="products.js"></script>
  <script src="app.js"></script>
  <script>
    function amacoUrlForProduct(p) {
      const slug = (p.code + "-" + p.name)
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-|-$/g, "");
      return "https://shop.amaco.com/" + slug + "/";
    }

    function lightenColor(hex) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return `rgb(${Math.min(255,r+50)},${Math.min(255,g+50)},${Math.min(255,b+50)})`;
    }

    function renderDetail() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");
      const main = document.getElementById("detail-main");
      const p = PRODUCTS.find(x => x.code === code);

      if (!p) {
        main.innerHTML = `
          <div class="detail-not-found">
            <h2>Glaze not found</h2>
            <p>We couldn't find a glaze with that code.</p>
            <a href="index.html" class="btn-primary">Back to shop</a>
          </div>`;
        return;
      }

      document.title = `${p.code} ${p.name} — Sample Glaze Co.`;
      const amaco = amacoUrlForProduct(p);
      const bgAlpha = p.color + "33";
      const imgSection = p.img
        ? `<img class="detail-img" src="${p.img}" alt="${p.code} ${p.name}"
             onerror="this.style.display='none';document.getElementById('detail-swatch-fb').style.display='block'" />
           <div id="detail-swatch-fb" class="detail-swatch-fallback"
             style="background:linear-gradient(145deg,${lightenColor(p.color)},${p.color});display:none"></div>`
        : `<div class="detail-swatch-fallback"
             style="background:linear-gradient(145deg,${lightenColor(p.color)},${p.color})"></div>`;

      main.innerHTML = `
        <a href="index.html" class="detail-back">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          Back to shop
        </a>
        <div class="detail-grid">
          <div class="detail-img-wrap" style="background:${bgAlpha}">
            ${imgSection}
          </div>
          <div class="detail-info">
            <div>
              <div class="detail-badges">
                <span class="detail-series-badge">${p.series}</span>
                ${p.outOfStock ? `<span class="badge badge-oos">Out of stock</span>` : p.isNew ? `<span class="badge badge-new">New</span>` : ""}
              </div>
            </div>
            <div>
              <div class="detail-code">${p.code}</div>
              <h1 class="detail-name">${p.name}</h1>
              <div class="detail-series-name">${SERIES_NAMES[p.series] || p.series} Series</div>
            </div>
            <div class="detail-price-row">
              <span class="detail-price">$${p.price.toFixed(2)}</span>
              <span class="detail-price-sub">· 4 oz sample jar</span>
            </div>
            <div class="detail-divider"></div>
            <div class="detail-meta">
              <div class="detail-meta-item">
                <div class="detail-meta-label">Fire range</div>
                <div class="detail-meta-value">Cone 5–10</div>
              </div>
              <div class="detail-meta-item">
                <div class="detail-meta-label">Size</div>
                <div class="detail-meta-value">4 oz jar</div>
              </div>
              <div class="detail-meta-item">
                <div class="detail-meta-label">Series</div>
                <div class="detail-meta-value">${SERIES_NAMES[p.series] || p.series}</div>
              </div>
              <div class="detail-meta-item">
                <div class="detail-meta-label">Color</div>
                <div class="detail-meta-value" style="display:flex;align-items:center;gap:8px">
                  <span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:${p.color};flex-shrink:0"></span>
                  ${p.color}
                </div>
              </div>
            </div>
            <div class="detail-actions">
              <button
                class="detail-add-btn"
                id="detail-add-btn"
                onclick="detailAddToCart('${p.code}')"
                ${p.outOfStock ? "disabled" : ""}
              >
                ${p.outOfStock ? "Out of stock" : "Add to cart"}
              </button>
              <a href="${amaco}" target="_blank" rel="noopener" class="detail-amaco-link">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                View on AMACO website
              </a>
            </div>
            <p class="detail-note">This is a 4 oz sample of an AMACO brand glaze, resold by Sample Glaze Co. for testing and swatching. Sample Glaze Co. is not affiliated with AMACO.</p>
          </div>
        </div>`;
    }

    function detailAddToCart(code) {
      addToCart(code);
      const btn = document.getElementById("detail-add-btn");
      if (btn) {
        btn.textContent = "Added ✓";
        btn.style.background = "#4CAF50";
        setTimeout(() => {
          btn.textContent = "Add to cart";
          btn.style.background = "";
        }, 1200);
      }
      toggleCart();
    }

    renderDetail();
  </script>
</body>
</html>
